<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HITOBITO 다운로드</title>
  <meta name="description" content="HITOBITO - 한국과 일본을 잇는 여행 매칭 앱 다운로드">
  <meta property="og:title" content="HITOBITO | 다운로드">
  <meta property="og:description" content="한국과 일본을 잇는 여행 매칭 앱, HITOBITO를 다운로드하세요.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="../../assets/images/favicon-hitobito.png">
  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      var appStoreUrl = 'https://apps.apple.com/app/id6768179325';
      var playStoreUrl = 'https://play.google.com/store/apps/details?id=com.simsimdev.mobile';
      var fallbackUrl = '../';

      if (isIOS) {
        window.location.href = appStoreUrl;
      } else if (isAndroid) {
        window.location.href = playStoreUrl;
      } else {
        window.location.href = fallbackUrl;
      }
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fdf3f0;
      color: #111827;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #e38d72;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p {
      font-size: 15px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>리다이렉트 중입니다...</p>
  </div>
</body>
</html>
